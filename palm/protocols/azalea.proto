syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.github.saturn_xiv.palm.plugins.azalea.v1";
option go_package = "github.com/saturn-xiv/palm/azalea/v2";
package palm.azalea.v1;

message Pager {
  int64 page = 1;
  int64 size = 2;
}

message Pagination {
  int64 page = 1;
  int64 size = 2;
  int64 total = 3;

  bool has_previous = 8;
  bool has_next = 9;
}

enum TextEditor {
  TextArea = 0;
  Markdown = 1;
  Quill = 9;
}
