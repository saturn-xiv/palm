syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.github.saturn_xiv.palm.plugins.lilac.auth.v1";
option go_package = "github.com/saturn-xiv/palm/lilac/auth/v2";
package palm.lilac.auth.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// ----------------------------------------------------------------------------
enum Editor {
  Textarea = 0;
  Quill = 1;
}

message Pager {
  int64 page = 1;
  int64 size = 2;
}

message Pagination {
  int64 page = 1;
  int64 size = 2;
  int64 total = 3;
  bool has_next = 8;
  bool has_previous = 9;
}
message IdRequest {
  uint32 id = 1;
}
// ----------------------------------------------------------------------------

service User {
  rpc SignInByEmail(UserSignInByEmailRequest) returns (UserSignInResponse) {}
  rpc SignUpByEmail(UserSignUpByEmailRequest) returns (google.protobuf.Empty) {}
  rpc ConfirmByEmail(UserByEmailRequest) returns (google.protobuf.Empty) {}
  rpc ConfirmByToken(UserConfirmByTokenRequest)
      returns (google.protobuf.Empty) {}
  rpc UnlockByEmail(UserByEmailRequest) returns (google.protobuf.Empty) {}
  rpc UnlockByToken(UserUnlockByTokenRequest) returns (google.protobuf.Empty) {}
  rpc ForgotPassword(UserByEmailRequest) returns (google.protobuf.Empty) {}
  rpc ResetPassword(UserResetPasswordRequest) returns (google.protobuf.Empty) {}

  rpc Attachments(Pager) returns (UserAttachmentsResponse) {}
  rpc Logs(Pager) returns (UserLogsResponse) {}
  rpc UpdateProfile(UserUpdateProfileRequest) returns (google.protobuf.Empty) {}
  rpc ChangePassword(UserChangePasswordRequest)
      returns (google.protobuf.Empty) {}
  rpc SignOut(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc Set(KvSetRequest) returns (google.protobuf.Empty) {}
  rpc Get(KvGetRequest) returns (KvGetResponse) {}
  rpc Refresh(UserRefreshRequest) returns (UserRefreshResponse) {}

  rpc Create(UserSignUpByEmailRequest) returns (google.protobuf.Empty) {}
  rpc Index(UserIndexRequest) returns (UserIndexResponse) {}
  rpc Sessions(Pager) returns (UserSessionsResponse) {}
  rpc SetPassword(UserSetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc Confirm(IdRequest) returns (google.protobuf.Empty) {}
  rpc Disable(IdRequest) returns (google.protobuf.Empty) {}
  rpc Enable(IdRequest) returns (google.protobuf.Empty) {}
  rpc Lock(IdRequest) returns (google.protobuf.Empty) {}
  rpc Unlock(IdRequest) returns (google.protobuf.Empty) {}
}

message UserByEmailRequest {
  EmailUserQuery user = 1;
  string home = 9;
}

message EmailUserQuery {
  oneof by {
    string email = 1;
    string nickname = 2;
  }
}

message UserSignInByEmailRequest {
  EmailUserQuery user = 1;
  string password = 2;
  google.protobuf.Duration ttl = 9;
}

message UserSignInResponse {
  string token = 1;
  string nickname = 11;
  string email = 12;
  string real_name = 16;
  string avatar = 17;
  string lang = 18;
  string timezone = 19;
  repeated PolicyRolesResponse.Item roles = 21;
  repeated PolicyPermissionsResponse.Item permissions = 22;
}

message UserSignUpByEmailRequest {
  string real_name = 1;
  string email = 2;
  string nickname = 3;
  string password = 4;
  string lang = 8;
  string timezone = 9;
}

message UserConfirmByTokenRequest {
  string token = 1;
}

message UserUnlockByTokenRequest {
  string token = 1;
}
message UserResetPasswordRequest {
  string token = 1;
  string password = 2;
}

message UserLogsResponse {
  message Item {
    enum Level {
      Info = 0;
      Warn = 1;
      Error = 2;
    }
    uint32 id = 1;
    string plugin = 2;
    string ip = 3;
    Level level = 4;
    PolicyPermissionsResponse.Item.Resource resource = 5;
    string message = 6;
    google.protobuf.Timestamp created_at = 9;
  }
  repeated Item items = 1;
  Pagination pagination = 2;
}

message UserChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message UserUpdateProfileRequest {
  string real_name = 1;
  string avatar = 2;
  string lang = 3;
  string timezone = 4;
}

message UserIndexRequest {
  UserIndexResponse.Item.ProviderType provider_type = 1;
  Pager pager = 9;
}
message UserIndexResponse {
  message Item {
    enum ProviderType {
      Email = 0;
      Google = 1;
      Facebook = 2;
      Apple = 3;

      WeChatMiniProgram = 91;
      WeChatOauth = 92;
    }
    message Detail {
      ProviderType provider_type = 1;
      string uid = 2;
      string name = 3;
      string avatar = 4;
      optional google.protobuf.Timestamp confirmed_at = 9;
    }
    Detail detail = 1;
    string lang = 2;
    string timezone = 3;

    uint32 sign_in_count = 21;
    string current_signed_in_ip = 22;
    google.protobuf.Timestamp current_signed_in_at = 23;
    string last_signed_in_ip = 24;
    google.protobuf.Timestamp last_signed_in_at = 25;

    optional google.protobuf.Timestamp locked_at = 31;
    optional google.protobuf.Timestamp deleted_at = 32;
  }
  repeated Item items = 1;
  Pagination pagination = 2;
}

message UserSessionsResponse {
  message Item {
    UserIndexResponse.Item user = 1;
    string uid = 2;
    string ip = 3;
    google.protobuf.Timestamp expired_at = 8;
    google.protobuf.Timestamp created_at = 9;
  }

  repeated Item items = 1;
  Pagination pagination = 2;
}

message UserSetPasswordRequest {
  uint32 user = 1;
  string password = 2;
}

message UserAttachmentsResponse {
  message Item {
    uint32 id = 1;
    string bucket = 2;
    string name = 3;
    string title = 4;
    uint32 size = 5;
    string content_type = 6;

    optional google.protobuf.Timestamp deleted_at = 8;
    google.protobuf.Timestamp updated_at = 9;
  }

  repeated Item items = 1;
  Pagination pagination = 2;
}
message UserRefreshRequest {
  google.protobuf.Duration ttl = 1;
}
message UserRefreshResponse {
  string token = 1;
}
// ----------------------------------------------------------------------------

service Policy {
  rpc Users(google.protobuf.Empty) returns (PolicyUsersResponse) {}
  rpc Roles(google.protobuf.Empty) returns (PolicyRolesResponse) {}

  rpc AddRolesForUser(PolicyRolesForUserRequest)
      returns (google.protobuf.Empty) {}
  rpc DeleteRolesForUser(PolicyRolesForUserRequest)
      returns (google.protobuf.Empty) {}
  rpc GetRolesForUser(PolicyUserRequest) returns (PolicyRolesResponse) {}

  rpc AddUsersForRole(PolicyUsersForRoleRequest)
      returns (google.protobuf.Empty) {}
  rpc DeleteUsersForRole(PolicyUsersForRoleRequest)
      returns (google.protobuf.Empty) {}
  rpc GetUsersForRole(PolicyRolesResponse.Item) returns (PolicyUsersResponse) {}
  rpc DeleteRole(PolicyRoleRequest) returns (google.protobuf.Empty) {}

  rpc AddPermissionsForUser(PolicyPermissionsForUserRequest)
      returns (google.protobuf.Empty) {}
  rpc DeletePermissionsForUser(PolicyPermissionsForUserRequest)
      returns (google.protobuf.Empty) {}
  rpc GetPermissionsForUser(PolicyUserRequest) returns (google.protobuf.Empty) {
  }

  rpc AddPermissionsForRole(PolicyPermissionsForRoleRequest)
      returns (google.protobuf.Empty) {}
  rpc DeletePermissionsForRole(PolicyPermissionsForRoleRequest)
      returns (google.protobuf.Empty) {}
  rpc GetPermissionsForRole(PolicyRoleRequest) returns (google.protobuf.Empty) {
  }
}

message PolicyUserRequest {
  uint32 id = 1;
}

message PolicyRoleRequest {
  string name = 1;
}

message PolicyRolesForUserRequest {
  uint32 user = 1;
  repeated PolicyRolesResponse.Item roles = 2;
}

message PolicyPermissionsForUserRequest {
  uint32 user = 1;
  repeated PolicyPermissionsResponse.Item permissions = 2;
}

message PolicyUsersForRoleRequest {
  PolicyRolesResponse.Item role = 1;
  repeated uint32 users = 2;
}
message PolicyPermissionsForRoleRequest {
  PolicyRolesResponse.Item role = 1;
  repeated PolicyPermissionsResponse.Item permissions = 2;
}

message PolicyRolesResponse {
  message Item {
    message Root {}
    message Administrator {}
    oneof by {
      Root root = 1;
      Administrator administrator = 2;
      string member = 3;
    }
  }

  repeated Item items = 1;
}

message PolicyUsersResponse {
  message Item {
    uint32 id = 1;
    string real_name = 2;
    UserIndexResponse.Item.ProviderType provider_type = 3;
    string provider_id = 4;
  }
  repeated Item items = 1;
}

message PolicyPermissionsResponse {
  message Item {
    message Resource {
      string type = 1;
      optional uint32 id = 2;
    }
    string operation = 1;
    Resource resource = 2;
  }
  repeated Item item = 1;
}

// ----------------------------------------------------------------------------

message SmsSendRequest {
  repeated string to = 1;
  string message = 2;
  optional string callback = 3;
}

service Sms {
  rpc Send(SmsSendRequest) returns (google.protobuf.Empty) {}
}

// ----------------------------------------------------------------------------

message EmailSendRequest {
  message Address {
    string name = 1;
    string email = 2;
  }
  message Body {
    string payload = 1;
    bool html = 2;
  }
  message Attachment {
    string title = 1;
    bytes payload = 2;
    bool inline = 8;
    string content_type = 9;
  }

  Address to = 1;
  repeated Address cc = 2;
  repeated Address bcc = 3;

  string subject = 11;
  Body body = 12;
  repeated Attachment attachments = 19;
}

service Email {
  rpc Send(EmailSendRequest) returns (google.protobuf.Empty) {}
}

// ----------------------------------------------------------------------------

service S3 {
  rpc CreateBucket(S3CreateBucketRequest) returns (S3CreateBucketResponse) {}
  rpc UploadFile(S3UploadFileRequest) returns (S3UploadFileResponse) {}

  rpc GetPresignedUrl(S3GetPresignedUrlRequest) returns (S3UrlResponse) {}
  rpc GetPermanentUrl(S3GetPermanentUrlRequest) returns (S3UrlResponse) {}
}
message S3CreateBucketRequest {
  string name = 1;
  optional uint32 expiration_days = 2;
  bool public = 9;
}

message S3CreateBucketResponse {
  string name = 1;
}

message S3UploadFileRequest {
  string bucket = 1;
  string object = 2;
  google.protobuf.Duration ttl = 3;
}

message S3UploadFileResponse {
  string url = 1;
}

message S3UploadResponse {
  string bucket = 1;
  string name = 2;
  string content_type = 3;
}

message S3GetPresignedUrlRequest {
  string bucket = 1;
  string object = 2;
  string title = 3;
  google.protobuf.Duration ttl = 4;
}

message S3GetPermanentUrlRequest {
  string bucket = 1;
  string object = 2;
}

message S3UrlResponse {
  string url = 1;
}

// ----------------------------------------------------------------------------
service Locale {
  rpc ByLang(LocaleByLangRequest) returns (LocaleByLangResponse) {}
  rpc Index(Pager) returns (LocaleIndexResponse) {}
  rpc Set(LocaleSetRequest) returns (google.protobuf.Empty) {}
  rpc Destroy(IdRequest) returns (google.protobuf.Empty) {}
}
message LocaleByLangRequest {
  string lang = 1;
}
message LocaleByLangResponse {
  message Item {
    string code = 1;
    string message = 2;
  }
  repeated Item items = 1;
}
message LocaleIndexResponse {
  message Item {
    uint32 id = 1;
    string lang = 2;
    string code = 3;
    string message = 4;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
  Pagination pagination = 2;
}
message LocaleSetRequest {
  string lang = 1;
  string code = 2;
  string message = 3;
}
// ----------------------------------------------------------------------------

service Site {
  rpc Set(KvSetRequest) returns (google.protobuf.Empty) {}
  rpc Get(KvGetRequest) returns (KvGetResponse) {}

  rpc SetInfo(SiteInfo) returns (google.protobuf.Empty) {}
  rpc GetInfo(google.protobuf.Empty) returns (SiteInfo) {}
  rpc SetFavicon(SiteFavicon) returns (google.protobuf.Empty) {}
  rpc GetFavicon(google.protobuf.Empty) returns (SiteFavicon) {}
  rpc SetAuthors(SiteAuthors) returns (google.protobuf.Empty) {}
  rpc GetAuthors(google.protobuf.Empty) returns (SiteAuthors) {}
  rpc SetKeywords(SiteKeywords) returns (google.protobuf.Empty) {}
  rpc GetKeywords(google.protobuf.Empty) returns (SiteKeywords) {}

  rpc SetIcpCode(SiteIcpCode) returns (google.protobuf.Empty) {}
  rpc GetIcpCode(google.protobuf.Empty) returns (SiteIcpCode) {}
  rpc DeleteIcpCode(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc SetGabCode(SiteGabCode) returns (google.protobuf.Empty) {}
  rpc GetGabCode(google.protobuf.Empty) returns (SiteGabCode) {}
  rpc DeleteGabCode(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc SetBaidu(SiteBaidu) returns (google.protobuf.Empty) {}
  rpc GetBaidu(google.protobuf.Empty) returns (SiteBaidu) {}
  rpc DeleteBaidu(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc PingBaidu(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc SetGoogle(SiteGoogle) returns (google.protobuf.Empty) {}
  rpc GetGoogle(google.protobuf.Empty) returns (SiteGoogle) {}
  rpc DeleteGoogle(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc PingGoogle(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc SetIndexNow(SiteIndexNow) returns (google.protobuf.Empty) {}
  rpc GetIndexNow(google.protobuf.Empty) returns (SiteIndexNow) {}
  rpc DeleteIndexNow(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc PingIndexNow(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc SetGoogleReCaptcha(SiteGoogleReCaptcha) returns (google.protobuf.Empty) {}
  rpc GetSiteGoogleReCaptcha(google.protobuf.Empty)
      returns (SiteGoogleReCaptcha) {}
  rpc DeleteSiteGoogleReCaptcha(google.protobuf.Empty)
      returns (google.protobuf.Empty) {}
}

message KvSetRequest {
  string key = 1;
  bytes value = 2;
  bool encrypt = 3;
}
message KvGetRequest {
  string key = 1;
}
message KvGetResponse {
  bytes value = 1;
}
message SiteIcpCode {
  string code = 1;
}
message SiteGabCode {
  string code = 1;
  string name = 2;
}

message SiteBaidu {
  string code = 1;
  string content = 2;
}
message SiteGoogle {
  string code = 1;
}

message SiteIndexNow {
  string key = 1;
}

message SiteGoogleReCaptcha {
  string site_key = 1;
  string secret = 2;
}

message SiteAuthors {
  message Item {
    string name = 1;
    string email = 2;
  }
  repeated Item ites = 1;
}

message SiteKeywords {
  repeated string items = 1;
}
message SiteInfo {
  string title = 1;
  string subhead = 2;
  string description = 3;
  string copyright = 4;
}
message SiteFavicon {
  string url = 1;
}
// ----------------------------------------------------------------------------
service LeaveWord {
  rpc Create(LeaveWordCreateRequest) returns (google.protobuf.Empty) {}
  rpc Index(Pager) returns (LeaveWordIndexResponse) {}
  rpc Delete(IdRequest) returns (google.protobuf.Empty) {}
}
message LeaveWordCreateRequest {
  string content = 1;
  Editor editor = 2;
  string ip = 3;
  string lang = 4;
}
message LeaveWordIndexResponse {
  message Item {
    uint32 id = 1;
    string ip = 2;
    string lang = 3;
    string content = 4;
    Editor editor = 5;
    optional google.protobuf.Timestamp published_at = 7;
    optional google.protobuf.Timestamp deleted_at = 8;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
  Pagination pagination = 2;
}
// ----------------------------------------------------------------------------
service Tag {
  rpc Create(TagCreateRequest) returns (google.protobuf.Empty) {}
  rpc Edit(TagEditRequest) returns (google.protobuf.Empty) {}
  rpc Index(google.protobuf.Empty) returns (TagIndexResponse) {}
  rpc Delete(IdRequest) returns (google.protobuf.Empty) {}
}
message TagCreateRequest {
  string name = 1;
}
message TagEditRequest {
  uint32 id = 1;
  string name = 2;
}
message TagIndexResponse {
  message Item {
    uint32 id = 1;
    string name = 2;
    int32 sort_order = 8;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
}
// ----------------------------------------------------------------------------
service Category {
  rpc Create(CategoryCreateRequest) returns (google.protobuf.Empty) {}
  rpc Edit(CategoryEditRequest) returns (google.protobuf.Empty) {}
  rpc Index(google.protobuf.Empty) returns (CategoryIndexResponse) {}
  rpc Delete(IdRequest) returns (google.protobuf.Empty) {}
}
message CategoryCreateRequest {
  string code = 1;
  int32 left = 11;
  int32 right = 12;
}
message CategoryEditRequest {
  uint32 id = 1;
  string code = 2;
  int32 left = 11;
  int32 right = 12;
}
message CategoryIndexResponse {
  message Item {
    uint32 id = 1;
    string code = 2;
    int32 left = 3;
    int32 right = 4;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
}

// ----------------------------------------------------------------------------
service Notification {
  rpc Create(NotificationCreateRequest) returns (google.protobuf.Empty) {}
  rpc SetRead(IdRequest) returns (google.protobuf.Empty) {}
  rpc Unread(google.protobuf.Empty) returns (NotificationIndexResponse) {}
  rpc Index(google.protobuf.Empty) returns (NotificationIndexResponse) {}
  rpc Delete(IdRequest) returns (google.protobuf.Empty) {}
}
message NotificationCreateRequest {
  string title = 1;
  string body = 2;
  string summary = 3;
  string url = 4;
}

message NotificationIndexResponse {
  message Item {
    uint32 id = 1;
    string title = 2;
    string body = 3;
    string summary = 4;
    string url = 5;
    optional google.protobuf.Timestamp read_at = 8;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
}

// ----------------------------------------------------------------------------

service WechatPay {}

// ----------------------------------------------------------------------------

service WechatOauth2 {}

// ----------------------------------------------------------------------------

service WechatMiniProgram {}

// ----------------------------------------------------------------------------

service GoogleOauth2 {}
