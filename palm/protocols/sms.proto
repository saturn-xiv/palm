syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.github.saturn_xiv.palm.plugins.petunia.sms.v1";
option go_package = "github.com/saturn-xiv/palm/petunia/sms/v2";
package palm.petunia.sms.v1;

message SendSmsTask {
  repeated string to = 1;
  string message = 2;
  optional string callback = 3;
}
