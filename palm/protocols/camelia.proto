syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.github.saturn_xiv.palm.plugins.camelia.v1";
option go_package = "github.com/saturn-xiv/palm/camelia/v2";
package palm.camelia.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

import "azalea.proto";

enum UserTokenAction {
  SignIn = 0;
  Confirm = 1;
  ResetPassword = 2;
  Unlock = 3;
  Cancel = 9;
}

message UserOauth2State {
  optional int64 user = 1;
  string code = 2;
}

message Resource {
  string type = 1;
  optional int64 id = 2;
}

message Permission {
  string operation = 1;
  Resource resource = 2;
}

message Menu {
  string key = 1;
  string label = 2;
  string path = 3;
  repeated Menu children = 9;
}

service User {
  rpc SignInByPassword(UserSignInByPasswordRequest)
      returns (UserSignInResponse) {}
  rpc SignUpByEmail(UserSignUpByEmailRequest) returns (google.protobuf.Empty) {}
  rpc ConfirmByEmail(UserEmailRequest) returns (google.protobuf.Empty) {}
  rpc ConfirmByToken(UserTokenRequest) returns (google.protobuf.Empty) {}
  rpc UnlockByEmail(UserEmailRequest) returns (google.protobuf.Empty) {}
  rpc UnlockByToken(UserTokenRequest) returns (google.protobuf.Empty) {}
  rpc ForgotPassword(UserEmailRequest) returns (google.protobuf.Empty) {}
  rpc ResetPassword(UserResetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc Logs(palm.azalea.v1.Pager) returns (UserLogsResponse) {}
  rpc ChangePassword(UserChangePasswordRequest)
      returns (google.protobuf.Empty) {}
  rpc SetLocation(UserSetLocationRequest) returns (google.protobuf.Empty) {}
  rpc SetProfile(UserSetProfileRequest) returns (google.protobuf.Empty) {}
  rpc Cancel(UserCancelRequest) returns (UserCancelResponse) {}
  rpc CancelByToken(UserTokenRequest) returns (google.protobuf.Empty) {}

  rpc Disable(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Enable(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Lock(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Unlock(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc SetPassword(UserSetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc ConfirmEmail(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}

  rpc IndexByEmail(palm.azalea.v1.Pager) returns (UserIndexResponse) {}
  rpc IndexByGoogle(palm.azalea.v1.Pager) returns (UserIndexResponse) {}
  rpc IndexByWechatMiniProgram(palm.azalea.v1.Pager)
      returns (UserIndexResponse) {}
  rpc IndexByWechatOauth2(palm.azalea.v1.Pager) returns (UserIndexResponse) {}
}
message UserIndexResponse {
  repeated UserDetails items = 1;
  palm.azalea.v1.Pagination pagination = 2;
}
message UserCancelRequest {
  string home = 1;
  string reason = 2;
}
message UserCancelResponse {
  oneof payload {
    string reminder = 1;
    string redirect_to = 2;
  }
}
message UserSetProfileRequest {
  string real_name = 1;
  string avatar = 2;
}
message UserSetLocationRequest {
  string lang = 1;
  string timezone = 2;
}
message UserChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message UserSetPasswordRequest {
  UserDetails.Type provider_type = 1;
  int64 provider_id = 2;
  string password = 3;
}
message UserResetPasswordRequest {
  string token = 1;
  string password = 2;
}
message UserEmailRequest {
  oneof user {
    string nickname = 1;
    string email = 2;
  }
  string home = 9;
}
message UserTokenRequest {
  string token = 1;
}

message UserDetails {
  enum Type {
    Email = 0;
    Phone = 1;
    Google = 2;
    WechatMiniProgram = 11;
    WechatOauth2 = 12;
  }
  Type type = 1;
  string id = 2;

  optional string name = 11;
  string lang = 12;
  string timezone = 13;
  optional string avatar = 19;
}

message UserSignInResponse {
  string token = 1;
  UserDetails details = 2;
  repeated string roles = 11;
  repeated Permission permissions = 12;
  repeated Menu menus = 13;
}

message UserSignInByPasswordRequest {
  oneof who {
    string nickname = 1;
    string email = 2;
    string phone = 3;
  }
  string password = 9;
  google.protobuf.Duration ttl = 11;
}

message UserSignUpByEmailRequest {
  string real_name = 1;
  string email = 2;
  string nickname = 3;
  string password = 4;

  string timezone = 11;
  string home = 19;
}

message UserLogsResponse {
  message Item {
    enum Level {
      Debug = 0;
      Info = 1;
      Warn = 2;
      Error = 3;
    }
    int64 id = 1;
    Level level = 2;
    string ip = 3;
    string message = 4;
    Resource resource = 5;
    google.protobuf.Timestamp created_at = 9;
  }

  repeated Item items = 1;
  palm.azalea.v1.Pagination pagination = 2;
}
// ----------------------------------------------------------------------------

service Attachment {
  rpc UploadUrl(AttachmentUploadUrlRequest)
      returns (AttachmentUploadUrlResponse) {}
  rpc Index(palm.azalea.v1.Pager) returns (AttachmentIndexResponse) {}
  rpc Publish(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Destroy(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Update(AttachmentUpdateRequest) returns (google.protobuf.Empty) {}
  rpc Show(AttachmentShowRequest) returns (AttachmentShowResponse) {}
  rpc Associate(AttachmentResourceRequest) returns (google.protobuf.Empty) {}
  rpc Dissociate(AttachmentResourceRequest) returns (google.protobuf.Empty) {}
}
message AttachmentShowRequest {
  int64 id = 1;
  optional google.protobuf.Duration ttl = 9;
}
message AttachmentShowResponse {
  string url = 1;
}
message AttachmentResourceRequest {
  int64 id = 1;
  string resource_type = 2;
  int64 resource_id = 3;
}

message AttachmentUpdateRequest {
  int64 id = 1;
  string title = 2;
}
message AttachmentUploadUrlRequest {
  string title = 1;
  string content_type = 2;
  uint64 size = 3;

  bool public = 11;
  optional int32 expiration_days = 12;
}
message AttachmentUploadUrlResponse {
  string url = 1;
}
message AttachmentIndexResponse {
  message Item {
    int64 id = 1;
    string bucket = 2;
    string name = 3;
    string title = 4;
    int64 size = 5;
    string content_type = 6;
    optional google.protobuf.Timestamp published_at = 7;
    optional google.protobuf.Timestamp deleted_at = 8;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
  palm.azalea.v1.Pagination pagination = 2;
}
// ----------------------------------------------------------------------------

service LeaveWord {
  rpc Create(LeaveWordCreateRequest) returns (google.protobuf.Empty) {}
  rpc Index(palm.azalea.v1.Pager) returns (LeaveWordIndexResponse) {}
  rpc Publish(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Destroy(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Close(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
  rpc Process(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
}

message LeaveWordCreateRequest {
  string body = 1;
  palm.azalea.v1.TextEditor editor = 2;
}

message LeaveWordIndexResponse {
  message Item {
    enum Status {
      Pending = 0;
      Processing = 2;
      Closed = 3;
    }
    int64 id = 1;
    string lang = 2;
    string ip = 3;
    string body = 4;
    palm.azalea.v1.TextEditor editor = 5;
    Status status = 6;
    optional google.protobuf.Timestamp published_at = 7;
    optional google.protobuf.Timestamp deleted_at = 8;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
  palm.azalea.v1.Pagination pagination = 2;
}
// ----------------------------------------------------------------------------

service Locale {
  rpc Index(palm.azalea.v1.Pager) returns (LocaleIndexResponse) {}
  rpc ByLang(LocaleByLangRequest) returns (LocaleByLangResponse) {}
  rpc Set(LocaleSetRequest) returns (google.protobuf.Empty) {}
  rpc Destroy(palm.azalea.v1.IdRequest) returns (google.protobuf.Empty) {}
}
message LocaleByLangRequest {
  string lang = 1;
}
message LocaleSetRequest {
  string lang = 1;
  string code = 2;
  string message = 3;
}
message LocaleIndexResponse {
  message Item {
    int64 id = 1;
    string lang = 2;
    string code = 3;
    string message = 4;
    google.protobuf.Timestamp updated_at = 9;
  }
  repeated Item items = 1;
  palm.azalea.v1.Pagination pagination = 2;
}
message LocaleByLangResponse {
  repeated LocaleIndexResponse.Item items = 1;
}
// ----------------------------------------------------------------------------
service Site {
  rpc Layout(google.protobuf.Empty) returns (SiteLayoutResponse) {}
  rpc Status(google.protobuf.Empty) returns (SiteStatusResponse) {}
  rpc SetInfo(SiteSetInfoRequest) returns (google.protobuf.Empty) {}
  rpc SetKeywords(SiteSetKeywordsRequest) returns (google.protobuf.Empty) {}
  rpc SetAuthor(SiteLayoutResponse.Author) returns (google.protobuf.Empty) {}
  rpc SetFavicon(SiteSetFaviconRequest) returns (google.protobuf.Empty) {}

  rpc SetBaidu(BaiduProfile) returns (google.protobuf.Empty) {}
  rpc GetBaidu(google.protobuf.Empty) returns (BaiduProfile) {}
  rpc SetIndexNow(IndexNowProfile) returns (google.protobuf.Empty) {}
  rpc GetIndexNow(google.protobuf.Empty) returns (IndexNowProfile) {}
  rpc SetGoogle(GoogleProfile) returns (google.protobuf.Empty) {}
  rpc GetGoogle(google.protobuf.Empty) returns (GoogleProfile) {}
  rpc SetReCaptcha(ReCaptchaProfile) returns (google.protobuf.Empty) {}
  rpc GetReCaptcha(google.protobuf.Empty) returns (ReCaptchaProfile) {}
}

message BaiduProfile {
  string code = 1;
  string content = 2;
}

message IndexNowProfile {
  string key = 1;
}
message GoogleProfile {
  string code = 1;
}
message ReCaptchaProfile {
  string site_key = 1;
  string secret = 2;
}
message SiteSetFaviconRequest {
  string url = 1;
}

message SiteLayoutResponse {
  message Author {
    string name = 1;
    string email = 2;
  }
  string lang = 1;
  string title = 2;
  string subhead = 3;
  Author author = 4;
  string description = 5;
  string favicon = 8;
  string copyright = 9;

  repeated string languages = 11;
}

message SiteSetKeywordsRequest {
  repeated string items = 1;
}
message SiteSetInfoRequest {
  string lang = 1;
  string title = 2;
  string subhead = 3;
  string description = 4;
  string copyright = 5;
}
message SiteStatusResponse {
  message PostgreSql {
    string version = 1;
  }
  message Redis {
    repeated string nodes = 1;
  }
  message OpenSearch {
    string version = 1;
  }
  PostgreSql postgresql = 1;
  Redis redis = 2;
  OpenSearch open_search = 3;
}
