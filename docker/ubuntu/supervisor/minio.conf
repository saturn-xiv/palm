# MINIO_ROOT_USER=admin MINIO_ROOT_PASSWORD=password ./minio server /mnt/data --console-address ":9001"

[program:minio]
directory=/usr/lib/postgresql/13
command=/usr/lib/postgresql/13/bin/postgres -D /var/lib/postgresql/13/main --config-file=/etc/postgresql/13/main/postgresql.conf
autostart=true
user=postgres
group=postgres
autorestart=true
loglevel=info
