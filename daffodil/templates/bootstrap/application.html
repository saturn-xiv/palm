<!DOCTYPE html>
<html lang="{{ site.locale }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}{% endblock %} | {{ site.subhead }} | {{ site.title }}
    </title>
    <link href="/3rd/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/public/bootstrap/application.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">{{ site.subhead }}</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarCollapse"
            aria-controls="navbarCollapse"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
              <li class="nav-item">
                <a
                  class="nav-link"
                  aria-current="page"
                  target="_blank"
                  href="/"
                >
                  {% if let Some(v) = i18n.get("home.title") %}{{ v }}{% endif %}
                </a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder='{% if let Some(v) = i18n.get("form.fields.search-box.placeholder") %}{{ v }}{% endif %}'
                aria-label="Search" 
              />
              <button class="btn btn-outline-success" type="submit">
                {% if let Some(v) = i18n.get("buttons.search") %}{{ v }}{% endif %}
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="footer mt-auto py-3 bg-body-tertiary">
      <div class="container">
        <span class="text-body-secondary">{{ site.copyright }}</span>
      </div>
    </footer>

    <script src="/3rd/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/bootstrap/application.js"></script>
  </body>
</html>
