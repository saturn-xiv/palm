[schema_migrations]
exists-by-version-and-name = SELECT COUNT(*) FROM schema_migrations WHERE version=:version AND name=:name
insert = INSERT INTO schema_migrations(name, version, up, down) VALUES(:name, :version, :up, :down)
all = SELECT * FROM schema_migrations ORDER BY created_at ASC
set-run-at = UPDATE schema_migrations SET run_at = CURRENT_TIMESTAMP WHERE id = :id
latest = SELECT * FROM schema_migrations WHERE run_at IS NOT NULL ORDER BY version DESC LIMIT 1
delete = DELETE FROM schema_migrations WHERE id = :id

[crawler]
logs.insert = INSERT INTO crawler_logs(url, body) VALUES(:url, :body)
logs.latest = SELECT * FROM crawler_logs WHERE url = :url ORDER BY created_at DESC LIMIT 1
logs.rolling = DELETE FROM crawler_logs WHERE created_at < now() - interval '3 years'

[sms]
logs.insert = INSERT INTO sms_logs("from", "to", body) VALUES(:from, :to, :body)
logs.by-phone = SELECT * FROM sms_logs WHERE "from" = :phone OR "to" = :phone ORDER BY created_at DESC
logs.all = SELECT * FROM sms_logs ORDER BY created_at DESC
logs.rolling = DELETE FROM sms_logs WHERE created_at < now() - interval '3 years'
