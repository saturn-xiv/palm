[users]
by-email = SELECT * FROM users WHERE email = :email LIMIT 1
by-uid = SELECT * FROM users WHERE uid = :uid LIMIT 1
by-nick_name = SELECT * FROM users WHERE nick_name = :nick_name LIMIT 1
sign-in = UPDATE users SET sign_in_count = sign_in_count+1, last_sign_in_at = current_sign_in_at, last_sign_in_ip = current_sign_in_ip, current_sign_in_ip = :ip, current_sign_in_at = CURRENT_TIMESTAMP, updated_at = CURRENT_TIMESTAMP WHERE id = :id
sign-up = INSERT INTO users(nick_name, real_name, email, uid, logo, lang, time_zone, profile, updated_at) VALUES(:nick_name, :real_name, :uid, :logo, :lang, :time_zone, :profile, CURRENT_TIMESTAMP)

[logs]
create = INSERT INTO logs(user_id, level, ip, message, created_at) VALUES(:user_id, :level, :ip, :message, CURRENT_TIMESTAMP)
