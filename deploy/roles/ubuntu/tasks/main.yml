- name: Update system
  become: true
  apt:
    upgrade: yes
    update_cache: yes
    cache_valid_time: 3600

- name: Install dependicy packages
  become: true
  apt:
    pkg:
      - apt-transport-https
      - software-properties-common
      - gnupg
      - openssh-server
      - openssh-client
      - sshpass
      - wpasupplicant
      - rsync
      - at
      - sysstat
      - libtool
      - ethtool
      - dnsutils
      - dnsmasq
      - net-tools
      - iputils-arping
      - iputils-ping
      - telnet
      - vim
      - git
      - pwgen
      - locales
      - ntpdate
      - imagemagick
      - mpg123
      - ffmpeg
      - sqlite3
      - tree
      - alsa-utils
      - pulseaudio
      - zsh
      - wget
      - curl
      - zip
      - unzip
      - openvpn
      - snmpd
      - systemd-cron
      - screen
      - tmux
      - python3
      - python3-pip
      - python3-distutils
      - python3-dev

- include: locales.yml

- name: Set default editor to vim
  become: true
  shell: update-alternatives --set editor /usr/bin/vim.basic

- name: Set timezone
  become: true
  shell: timedatectl set-timezone Asia/Shanghai

- name: Set git rebase mode
  become: true
  shell: git config --global pull.rebase false

- include: python.yml
- include: zsh.yml

- include: clean.yml
