- include: init.yml
- include: sshd.yml
- include: ulimits.yml

- name: Set timezone
  become: true
  shell: timedatectl set-timezone UTC

- name: Setup sudo without password 
  become: true
  lineinfile:
    path: /etc/sudoers.d/100-{{ ansible_user }}
    line: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL"
  when: ansible_distribution != 'Raspbian' && ansible_user != 'root'

- name: Setup journald storage 
  become: true
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#Storage='
    line: Storage=persistent

# https://www.linode.com/docs/quick-answers/linux/how-to-use-journalctl/
- name: Setup journald storage keep-free
  become: true
  lineinfile:
    path: /etc/systemd/journald.conf
    state: present
    regexp: '^#SystemKeepFree='
    line: SystemKeepFree=6%
