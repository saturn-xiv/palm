mailer.confirmation-instructions.subject = "Confirmation instructions"
mailer.confirmation-instructions.instruction = "Welcome {{ recipient }}! <br /> You can confirm your account email through the link below: <br /> <a target='_blank' href='{{ home }}/anonymous/users/confirm/{{ token }}'>Confirm my account</a>"
