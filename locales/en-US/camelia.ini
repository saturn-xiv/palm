mailer.email-changed.message = "Hello {{ recipient }}! <br />We're contacting you to notify you that your email has been changed to {{ email }}."
mailer.email-changed.message-unconfirmed = "Hello {{ recipient }}! <br /> We're contacting you to notify you that your email is being changed to {{ email }}."
mailer.password-changed.subject = "Password Changed"
mailer.password-changed.body = "Hello {{ recipient }}! <br /> We're contacting you to notify you that your password has been changed."
mailer.reset-password-instructions.subject = "Reset password instructions"
mailer.reset-password-instructions.body = "Hello {{ recipient }}! <br /> Someone has requested a link to change your password. You can do this through the link below: <br /> <a target='_blank' href='{{ home }}/my/anonymous/users/reset-password/{{ token }}'>Change my password</a> <br /> If you didn't request this, please ignore this email.<br />Your password won't change until you access the link above and create a new one."
mailer.unlock-instructions.subject = "Unlock instructions"
mailer.unlock-instructions.body = "Hello {{ recipient }}! <br/> Your account has been locked due to an excessive number of unsuccessful sign in attempts. <br /> Click the link below to unlock your account: <br /> <a target='_blank' href='{{ home }}/my/anonymous/users/unlock/{{ token }}'>Unlock my account</a>"

